<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ParcelTrace — Package Tracking</title>
  <!-- GENERATED FILE: built by scripts/build-app.js — edit src/index.template.html, styles.css, app.js instead -->
  <!--INLINE_CSS-->
</head>
<body>
  <header class="app-header">
    <div class="row">
      <div class="brand">
        <span class="logo">📦</span>
        <span>ParcelTrace<small>Shipment visibility console</small></span>
      </div>
      <label class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7" /><line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input id="search" type="text" placeholder="Search tracking ID, city, carrier, recipient…" autocomplete="off" />
      </label>
    </div>
    <div class="stats" id="stats"></div>
  </header>

  <main class="main">
    <div class="filters" id="filters">
      <select id="carrierFilter"><option value="">All carriers</option></select>
      <select id="serviceFilter"><option value="">All service levels</option></select>
      <span class="result-count" id="resultCount"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-sort="trackingId">Tracking ID <span class="arrow"></span></th>
            <th data-sort="carrier" class="hide-sm">Carrier <span class="arrow"></span></th>
            <th data-sort="serviceLevel" class="hide-sm">Service <span class="arrow"></span></th>
            <th data-sort="status">Status <span class="arrow"></span></th>
            <th data-sort="route">Route <span class="arrow"></span></th>
            <th data-sort="estimatedDelivery" class="hide-sm">Est. delivery <span class="arrow"></span></th>
            <th data-sort="weightKg" class="hide-sm">Weight <span class="arrow"></span></th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div class="empty" id="empty" style="display:none">No packages match your filters.</div>
    </div>
  </main>

  <div class="overlay" id="overlay"></div>
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-head" id="drawerHead"></div>
    <div class="drawer-body" id="drawerBody"></div>
  </aside>

  <!--INLINE_DATA-->
  <!--INLINE_APP-->
</body>
</html>
